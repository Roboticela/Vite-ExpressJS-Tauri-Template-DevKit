name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "0.1.0"
      prerelease:
        description: "Mark as pre-release?"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft release?"
        required: false
        type: boolean
        default: false

# Optional secrets for Android signing:
#   ANDROID_KEYSTORE_BASE64   — base64-encoded .keystore file
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — private key password
#   ANDROID_STORE_PASSWORD    — keystore password
# If none are provided a self-signed keystore is generated automatically.

env:
  APP_NAME: "Roboticela DevKit"
  NDK_VERSION: "27.0.12077973"
  NODE_VERSION: "24"

jobs:
  # ─────────────────────────────────────────────
  # Patch version in all manifests
  # ─────────────────────────────────────────────
  prepare:
    name: Patch version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Patch tauri.conf.json
        run: |
          jq --arg v "${{ github.event.inputs.version }}" '.version = $v' \
            src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json

      - name: Patch Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ github.event.inputs.version }}\"/" \
            src-tauri/Cargo.toml

      - name: Patch root package.json
        run: |
          jq --arg v "${{ github.event.inputs.version }}" '.version = $v' \
            package.json > /tmp/package.json
          mv /tmp/package.json package.json

      - name: Patch server package.json
        run: |
          jq --arg v "${{ github.event.inputs.version }}" '.version = $v' \
            server/package.json > /tmp/server-package.json
          mv /tmp/server-package.json server/package.json

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: patched-source
          path: .

  # ─────────────────────────────────────────────
  # Linux — x86_64, aarch64, i686, armv7
  #   x86_64 / aarch64 : native runners
  #   i686              : cross-compiled on ubuntu-22.04 (x86_64 runner)
  #   armv7             : cross-compiled on ubuntu-22.04-arm (aarch64 runner)
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            cross: false
            deb-arch: ""
          - arch: aarch64
            runner: ubuntu-22.04-arm
            rust-target: aarch64-unknown-linux-gnu
            cross: false
            deb-arch: ""
          - arch: i686
            runner: ubuntu-22.04
            rust-target: i686-unknown-linux-gnu
            cross: true
            deb-arch: i386
          - arch: armv7
            runner: ubuntu-22.04-arm
            rust-target: armv7-unknown-linux-gnueabihf
            cross: true
            deb-arch: armhf
    steps:
      - uses: actions/checkout@v4

      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - name: Enable cross-compilation APT architecture
        if: matrix.cross == true
        run: |
          sudo dpkg --add-architecture ${{ matrix.deb-arch }}
          sudo add-apt-repository -y universe
          sudo apt-get update

      - name: Install system dependencies (native)
        if: matrix.cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install system dependencies (cross i686)
        if: matrix.arch == 'i686'
        run: |
          sudo apt-get update
          # Install C cross-compiler only (provides i686-linux-gnu-gcc). Skip g++ to avoid
          # strict version dependency on gcc-11-i686-linux-gnu that may be missing on some mirrors.
          sudo apt-get install -y --no-install-recommends \
            gcc-11-i686-linux-gnu \
            gcc-multilib g++-multilib \
            libwebkit2gtk-4.1-dev:i386 \
            librsvg2-dev:i386 \
            libsoup-3.0-dev:i386 \
            patchelf

      - name: Install system dependencies (cross armv7)
        if: matrix.arch == 'armv7'
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            libwebkit2gtk-4.1-dev:armhf \
            librsvg2-dev:armhf \
            libsoup-3.0-dev:armhf \
            patchelf

      - name: Configure cross-compilation environment
        if: matrix.cross == true
        run: |
          if [ "${{ matrix.arch }}" = "i686" ]; then
            echo "PKG_CONFIG_ALLOW_CROSS=1"                                    >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig"           >> $GITHUB_ENV
            echo "CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER=i686-linux-gnu-gcc" >> $GITHUB_ENV
          elif [ "${{ matrix.arch }}" = "armv7" ]; then
            echo "PKG_CONFIG_ALLOW_CROSS=1"                                    >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig"      >> $GITHUB_ENV
            echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}

      - name: Upload Linux artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-artifacts
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage

  # ─────────────────────────────────────────────
  # Windows — x86_64, aarch64, i686
  #   x86_64 / i686 : windows-latest (x86_64 runner, MSVC supports both)
  #   aarch64       : windows-11-arm (native ARM64 runner)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - arch: i686
            runner: windows-latest
            rust-target: i686-pc-windows-msvc
          - arch: aarch64
            runner: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}

      - name: Upload Windows artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi

  # ─────────────────────────────────────────────
  # Android — all 4 ABIs (apk) + fat AAB
  # ─────────────────────────────────────────────
  build-android:
    name: Android
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: patched-source
          path: .

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add all Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Tauri Android
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Copy custom Android icons
        run: |
          cp -r src-tauri/icons/android/. \
            src-tauri/gen/android/app/src/main/res/

      # ── Signing: use repo secrets if provided, otherwise generate a keystore ──
      - name: Resolve Android signing keystore
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "source=secrets" >> $GITHUB_OUTPUT
            echo "⚙️  Using signing secrets from repository"
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/release.keystore
            echo "KEYSTORE_PATH=$HOME/release.keystore"                       >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"            >> $GITHUB_ENV
            echo "KEYSTORE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"  >> $GITHUB_ENV
            echo "KEYSTORE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "source=generated" >> $GITHUB_OUTPUT
            echo "⚙️  No signing secrets found — generating a self-signed keystore"
            keytool -genkey -v \
              -keystore $HOME/release.keystore \
              -alias devkit \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass devkit-pass \
              -keypass devkit-pass \
              -storetype pkcs12 \
              -dname "CN=${{ env.APP_NAME }}, OU=DevKit, O=Roboticela, L=Unknown, S=Unknown, C=US" \
              -noprompt
            echo "KEYSTORE_PATH=$HOME/release.keystore"  >> $GITHUB_ENV
            echo "KEYSTORE_ALIAS=devkit"                 >> $GITHUB_ENV
            echo "KEYSTORE_KEY_PASSWORD=devkit-pass"     >> $GITHUB_ENV
            echo "KEYSTORE_STORE_PASSWORD=devkit-pass"   >> $GITHUB_ENV
          fi

      - name: Print signing source
        run: |
          if [ "${{ steps.signing.outputs.source }}" = "secrets" ]; then
            echo "✅ Signed with repository secrets"
          else
            echo "⚠️  Signed with auto-generated keystore (suitable for testing, not Play Store)"
          fi

      - name: Inject signing config into build.gradle.kts
        env:
          GRADLE_KTS: src-tauri/gen/android/app/build.gradle.kts
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ env.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ env.KEYSTORE_STORE_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os, re

          path = os.environ["GRADLE_KTS"]
          keystore_path  = os.environ["KEYSTORE_PATH"].replace("\\", "/")
          store_password = os.environ["KEYSTORE_STORE_PASSWORD"]
          key_alias      = os.environ["KEYSTORE_ALIAS"]
          key_password   = os.environ["KEYSTORE_KEY_PASSWORD"]

          with open(path) as f:
              content = f.read()

          signing_config = f'''
              signingConfigs {{
                  create("release") {{
                      storeFile = file("{keystore_path}")
                      storePassword = "{store_password}"
                      keyAlias = "{key_alias}"
                      keyPassword = "{key_password}"
                  }}
              }}
          '''

          content = re.sub(
              r'(\s*buildTypes\s*\{)',
              signing_config + r'\1',
              content,
              count=1
          )

          content = re.sub(
              r'(getByName\("release"\)\s*\{)',
              r'\1\n                signingConfig = signingConfigs.getByName("release")',
              content,
              count=1
          )

          with open(path, "w") as f:
              f.write(content)

          print("✅ Signing config injected into", path)
          PYEOF

      - name: Build APK (all ABIs, split per ABI)
        run: npx tauri android build --apk --split-per-abi
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ env.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ env.KEYSTORE_STORE_PASSWORD }}

      - name: Build AAB (fat bundle, all ABIs)
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_ALIAS: ${{ env.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ env.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ env.KEYSTORE_STORE_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  # ─────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.msi' -o -name '*.apk' -o -name '*.aab' \) -exec sha256sum {} \; | sort -k2 > SHA256SUMS
          find . -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.msi' -o -name '*.apk' -o -name '*.aab' \) -exec sha512sum {} \; | sort -k2 > SHA512SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
          echo "--- SHA512SUMS ---"
          cat SHA512SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: ${{ env.APP_NAME }} v${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          draft: ${{ github.event.inputs.draft }}
          generate_release_notes: true
          body: |
            ## ${{ env.APP_NAME }} v${{ github.event.inputs.version }}

            ### Downloads
            | Platform | Architecture | Format |
            |----------|-------------|--------|
            | Linux | x86_64 | `.deb`, `.rpm`, `.AppImage` |
            | Linux | aarch64 | `.deb`, `.rpm`, `.AppImage` |
            | Linux | i686 (32-bit) | `.deb`, `.rpm`, `.AppImage` |
            | Linux | armv7 (32-bit ARM) | `.deb`, `.rpm`, `.AppImage` |
            | Windows | x86_64 | `.exe` (NSIS installer), `.msi` |
            | Windows | i686 (32-bit) | `.exe` (NSIS installer), `.msi` |
            | Windows | aarch64 (ARM64) | `.exe` (NSIS installer), `.msi` |
            | Android | arm64-v8a, armeabi-v7a, x86, x86_64 | `.apk` (per-ABI), `.aab` |

            ### Verify downloads
            `SHA256SUMS` and `SHA512SUMS` are included so you can verify file integrity:
            ```bash
            sha256sum -c SHA256SUMS
            # or
            sha512sum -c SHA512SUMS
            ```

            > **Android signing:** ${{ needs.build-android.result == 'success' && 'Signed (see build log for keystore source)' || 'Build failed' }}
          files: |
            artifacts/SHA256SUMS
            artifacts/SHA512SUMS
            artifacts/linux-x86_64-artifacts/**/*
            artifacts/linux-aarch64-artifacts/**/*
            artifacts/linux-i686-artifacts/**/*
            artifacts/linux-armv7-artifacts/**/*
            artifacts/windows-x86_64-artifacts/**/*
            artifacts/windows-i686-artifacts/**/*
            artifacts/windows-aarch64-artifacts/**/*
            artifacts/android-artifacts/**/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
